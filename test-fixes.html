<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试修复</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 3px; }
        .pass { background-color: #d4edda; color: #155724; }
        .fail { background-color: #f8d7da; color: #721c24; }
        button { margin: 5px; padding: 10px; }
        .word-display { font-size: 24px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>VocabQuiz 修复测试</h1>
    
    <div class="test-section">
        <h2>测试 1: 单词切换修复</h2>
        <p>测试单词切换时前端界面是否正确更新</p>
        <div class="word-display" id="wordDisplay">点击开始测试</div>
        <div class="chinese-display" id="chineseDisplay"></div>
        <button onclick="testWordSwitching()">测试单词切换</button>
        <div id="wordSwitchResult" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试 2: 词库导入修复</h2>
        <p>测试词库导入功能是否正确处理重复单词</p>
        <button onclick="testLibraryImport()">测试词库导入</button>
        <div id="importResult" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试 3: 模式切换修复</h2>
        <p>测试模式切换功能是否正常</p>
        <button onclick="testModeSwitching()">测试模式切换</button>
        <div id="modeSwitchResult" class="test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试 4: 进度条修复</h2>
        <p>测试进度条显示是否正确</p>
        <div class="progress-section">
            <div class="progress-text">测试进度: <span id="progressText">0%</span></div>
            <div class="progress-bar" style="width: 100%; background-color: #f0f0f0; height: 20px; border-radius: 10px;">
                <div class="progress-fill" id="progressBar" style="width: 0%; background-color: #4CAF50; height: 100%; border-radius: 10px;"></div>
            </div>
        </div>
        <button onclick="testProgressBar()">测试进度条</button>
        <div id="progressResult" class="test-result"></div>
    </div>
    
    <script type="module">
        import { init, setWords, knownWord, unknownWord, previousWord, startReview, returnToMainMode, updateStats, showCurrentWord, startTest } from './src/js/quiz.js';
        import { openDB, createLibrary, addWordsToLibrary, getWordsByLibraryId } from './src/js/db.js';
        import { showToast } from './src/js/ui.js';
        
        // 测试数据
        const testWords = [
            { english: 'test', chinese: '测试' },
            { english: 'example', chinese: '例子' },
            { english: 'vocabulary', chinese: '词汇' },
            { english: 'quiz', chinese: '测验' }
        ];
        
        async function initTest() {
            await openDB();
            setWords(testWords);
        }
        
        async function testWordSwitching() {
            const resultDiv = document.getElementById('wordSwitchResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                await initTest();
                startTest();
                
                // 显示第一个单词
                showCurrentWord();
                const firstWord = document.getElementById('wordDisplay').textContent;
                
                // 点击认识，下一个
                knownWord();
                const secondWord = document.getElementById('wordDisplay').textContent;
                
                // 点击不认识，标记复习
                unknownWord();
                const thirdWord = document.getElementById('wordDisplay').textContent;
                
                // 点击上一个
                previousWord();
                const fourthWord = document.getElementById('wordDisplay').textContent;
                
                if (firstWord !== secondWord && secondWord !== thirdWord && thirdWord !== fourthWord && fourthWord === secondWord) {
                    resultDiv.innerHTML = '✓ 单词切换测试通过';
                    resultDiv.className = 'test-result pass';
                } else {
                    resultDiv.innerHTML = `✗ 单词切换测试失败: 第一个单词: ${firstWord}, 第二个单词: ${secondWord}, 第三个单词: ${thirdWord}, 第四个单词: ${fourthWord}`;
                    resultDiv.className = 'test-result fail';
                }
            } catch (error) {
                resultDiv.innerHTML = `✗ 测试失败: ${error.message}`;
                resultDiv.className = 'test-result fail';
            }
        }
        
        async function testLibraryImport() {
            const resultDiv = document.getElementById('importResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                await openDB();
                
                // 创建测试词库
                const libraryId = await createLibrary('测试词库', '用于测试的词库');
                
                // 导入单词
                const addedCount = await addWordsToLibrary(libraryId, testWords);
                
                // 再次导入相同的单词（应该不会重复）
                const addedCount2 = await addWordsToLibrary(libraryId, testWords);
                
                // 获取词库中的单词
                const words = await getWordsByLibraryId(libraryId);
                
                if (words.length === testWords.length && addedCount === testWords.length && addedCount2 === 0) {
                    resultDiv.innerHTML = '✓ 词库导入测试通过';
                    resultDiv.className = 'test-result pass';
                } else {
                    resultDiv.innerHTML = `✗ 词库导入测试失败: 期望 ${testWords.length} 个单词，实际 ${words.length} 个，首次导入 ${addedCount} 个，二次导入 ${addedCount2} 个`;
                    resultDiv.className = 'test-result fail';
                }
            } catch (error) {
                resultDiv.innerHTML = `✗ 测试失败: ${error.message}`;
                resultDiv.className = 'test-result fail';
            }
        }
        
        async function testModeSwitching() {
            const resultDiv = document.getElementById('modeSwitchResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                await initTest();
                startTest();
                
                // 标记一个单词为不认识
                unknownWord();
                
                // 进入复习模式
                startReview();
                const reviewMode = document.getElementById('modeIndicator').textContent;
                
                // 切换回测试模式
                returnToMainMode();
                const testMode = document.getElementById('modeIndicator').textContent;
                
                if (reviewMode.includes('复习') && testMode.includes('测试')) {
                    resultDiv.innerHTML = '✓ 模式切换测试通过';
                    resultDiv.className = 'test-result pass';
                } else {
                    resultDiv.innerHTML = `✗ 模式切换测试失败: 复习模式显示: ${reviewMode}, 测试模式显示: ${testMode}`;
                    resultDiv.className = 'test-result fail';
                }
            } catch (error) {
                resultDiv.innerHTML = `✗ 测试失败: ${error.message}`;
                resultDiv.className = 'test-result fail';
            }
        }
        
        async function testProgressBar() {
            const resultDiv = document.getElementById('progressResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                await initTest();
                startTest();
                
                // 测试初始进度
                updateStats();
                const initialProgress = document.getElementById('progressText').textContent;
                
                // 点击认识，下一个
                knownWord();
                updateStats();
                const progress1 = document.getElementById('progressText').textContent;
                
                // 点击不认识，标记复习
                unknownWord();
                updateStats();
                const progress2 = document.getElementById('progressText').textContent;
                
                if (initialProgress.includes('0/4') && progress1.includes('1/4') && progress2.includes('2/4')) {
                    resultDiv.innerHTML = '✓ 进度条测试通过';
                    resultDiv.className = 'test-result pass';
                } else {
                    resultDiv.innerHTML = `✗ 进度条测试失败: 初始进度: ${initialProgress}, 进度1: ${progress1}, 进度2: ${progress2}`;
                    resultDiv.className = 'test-result fail';
                }
            } catch (error) {
                resultDiv.innerHTML = `✗ 测试失败: ${error.message}`;
                resultDiv.className = 'test-result fail';
            }
        }
        
        // 初始化测试
        initTest();
    </script>
</body>
</html>
